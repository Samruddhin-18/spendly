{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block content %}

<section class="dashboard-section">
    <div class="dashboard-container">

        <h1 class="dashboard-heading">Edit Expense</h1>

        <div class="dashboard-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount"
                               class="form-input" step="0.01" min="0.01"
                               value="{{ amount if amount is defined else expense.amount }}" placeholder="0.00"
                               required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" class="form-input" required>
                            <option value="" disabled {% if not (category or expense.category) %}selected{% endif %}>Select a category</option>
                            {% for c in categories %}
                            <option value="{{ c }}" {% if (category if category is defined else expense.category) == c %}selected{% endif %}>{{ c }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date"
                               class="form-input" max="{{ today }}"
                               value="{{ date if date is defined else expense.date }}" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" name="description"
                               class="form-input" placeholder="Optional"
                               value="{{ description if description is defined else (expense.description or '') }}">
                    </div>
                </div>
                <button type="submit" class="btn-submit dashboard-submit">Save Changes</button>
            </form>
        </div>

    </div>
</section>

{% endblock %}
