{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}

<section class="dashboard-section">
    <div class="dashboard-container">

        <h1 class="dashboard-heading">Add Expense</h1>

        <div class="dashboard-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount"
                               class="form-input" step="0.01" min="0.01"
                               value="{{ amount or '' }}" placeholder="0.00"
                               required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" class="form-input" required>
                            <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
                            {% for c in categories %}
                            <option value="{{ c }}" {% if category == c %}selected{% endif %}>{{ c }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date"
                               class="form-input" max="{{ today }}"
                               value="{{ date or today }}" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" name="description"
                               class="form-input" placeholder="Optional"
                               value="{{ description or '' }}">
                    </div>
                </div>
                <button type="submit" class="btn-submit dashboard-submit">Add Expense</button>
            </form>
        </div>

    </div>
</section>

{% endblock %}
